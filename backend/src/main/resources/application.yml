
server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mine_safety?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  data:
    elasticsearch:
      repositories:
        enabled: true
      cluster-nodes: localhost:9200

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-underline: true

logging:
  level:
    com.mine.safety: DEBUG
    org.springframework.web.socket: DEBUG
